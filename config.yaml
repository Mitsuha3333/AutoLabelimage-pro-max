qwen:
  base_url: "http://127.0.0.1:8887"
  chat_completions_path: "/v1/chat/completions"
  timeout: 60
  model: "Qwen3VL-8B-Instruct"
  prompt_template: |
    你是一个严格的视觉标注器。

    任务：
    只检测图中所有清晰可见的以下目标：
    {class_bullets}

    只返回 JSON 数组，不要返回任何解释。

    格式必须严格为：
    [
      {"label":"类别名","bbox":[x1,y1,x2,y2]}
    ]

    规则：
    - label 必须严格来自给定类别列表
    - bbox 使用 0~1000 的相对坐标
    - 不要使用像素坐标
    - 坐标原点是图像左上角
    - x1 < x2
    - y1 < y2
    - bbox 必须贴合目标边界
    - 不要重复输出
    - 不确定就不要输出
    - 没有目标时返回 []

    最终答案只能是 JSON 数组。

sam:
  model_type: "vit_b"
  checkpoint: "./models/sam_vit_b_01ec64.pth"
  device: "cuda"
  expand_ratio: 0.02
  min_box_area: 16
  min_area_ratio: 0.6
  max_area_ratio: 1.15
  max_center_shift_ratio: 0.15

project:
  auto_save: true
  save_intermediate_json: true
  classes_file: "classes.txt"
